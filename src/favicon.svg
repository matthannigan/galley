<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .rim { fill: #3d3d3a; }
    .tray { fill: none; stroke: #3d3d3a; stroke-width: 1.2; }
    .line { fill: #3d3d3a; }
    @media (prefers-color-scheme: dark) {
      .rim { fill: #c2c0b6; }
      .tray { stroke: #c2c0b6; }
      .line { fill: #c2c0b6; }
    }
  </style>
  <!-- Raised rim -->
  <rect class="rim" x="1" y="2" width="30" height="4" rx="1.5" opacity="0.85"/>
  <!-- Tray body -->
  <rect class="tray" x="2" y="5" width="28" height="25" rx="2"/>
  <!-- Lines of composed type -->
  <rect class="line" x="6" y="11" width="20" height="2.2" rx="0.5" opacity="0.7"/>
  <rect class="line" x="6" y="15.5" width="20" height="2.2" rx="0.5" opacity="0.7"/>
  <rect class="line" x="6" y="20" width="20" height="2.2" rx="0.5" opacity="0.7"/>
  <rect class="line" x="6" y="24.5" width="14" height="2.2" rx="0.5" opacity="0.6"/>
</svg>
