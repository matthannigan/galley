services:
  galley:
    build: .
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - ${HOST_MOUNT_PATH:-./mount}:/docs
    environment:
      - GALLEY_DOCS_DIR=/docs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped